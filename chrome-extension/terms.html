<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Términos y Condiciones - ApplyGuard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f5f5f5;
      padding: 40px 20px;
      line-height: 1.6;
      color: #333;
    }
    
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      overflow: hidden;
      position: relative;
    }
    
    .header {
      background: linear-gradient(135deg, #1a472a, #2e7d32);
      color: white;
      padding: 30px;
      text-align: center;
    }
    
    .header h1 {
      margin: 0;
      font-size: 28px;
      color: white;
      font-weight: bold;
    }
    
    .header p {
      margin: 10px 0 0;
      color: white;
      opacity: 0.95;
      font-weight: normal;
    }
    
    .header .subtitle {
      font-size: 14px;
      margin-top: 5px;
    }
    
    .header .update-date {
      font-size: 12px;
      margin-top: 8px;
      opacity: 0.85;
    }
    
    .language-selector {
      position: absolute;
      top: 20px;
      right: 20px;
      background: white;
      padding: 5px 10px;
      border-radius: 20px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      z-index: 10;
    }
    
    .language-selector select {
      border: none;
      background: transparent;
      font-size: 12px;
      cursor: pointer;
    }
    
    .content {
      padding: 40px;
    }
    
    .section {
      margin-bottom: 30px;
      border-bottom: 1px solid #eee;
      padding-bottom: 25px;
    }
    
    .section:last-child {
      border-bottom: none;
    }
    
    h2 {
      color: #1a472a;
      font-size: 20px;
      margin-bottom: 15px;
    }
    
    p {
      margin-bottom: 12px;
      color: #555;
    }
    
    .warning-box {
      background: #fff3e0;
      border-left: 4px solid #ff9800;
      padding: 15px;
      margin: 20px 0;
      border-radius: 8px;
    }
    
    .footer {
      background: #f9f9f9;
      padding: 20px 40px;
      border-top: 1px solid #eee;
      font-size: 12px;
      color: #999;
      text-align: center;
    }
    
    @media (max-width: 600px) {
      .content {
        padding: 20px;
      }
      .header {
        padding: 20px;
      }
      .header h1 {
        font-size: 22px;
      }
      h2 {
        font-size: 18px;
      }
      .language-selector {
        top: 10px;
        right: 10px;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="language-selector">
    <select id="langSelect">
      <option value="es">🇪🇸 Español</option>
      <option value="en">🇺🇸 English</option>
      <option value="fr">🇫🇷 Français</option>
      <option value="de">🇩🇪 Deutsch</option>
      <option value="pt">🇵🇹 Português</option>
    </select>
  </div>


<div class="header">
  <h1 id="pageTitle">📋 Términos y Condiciones de Uso</h1>
  <p id="pageSubtitle" class="subtitle">ApplyGuard - Verificador de ofertas de trabajo</p>
  <p id="lastUpdate" class="update-date">Última actualización: marzo 2026</p>
</div>
  
  <div class="content" id="content">
    <div style="text-align: center; padding: 40px;">Cargando...</div>
  </div>
  
  <div class="footer">
    <p>© 2026 ApplyGuard - Todos los derechos reservados</p>
    <p><a href="#" id="closeWindow" style="color: #2e7d32;">Cerrar esta ventana</a></p>
  </div>
</div>

<script src="terms.js"></script>
</body>
</html>
